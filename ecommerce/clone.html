<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coze Web SDK</title>
    <style>
      * { box-sizing: border-box;}
      html { margin: 0; height: 100%; }
      body { margin: 0; padding: 8px; height: 100%; }
    </style>
  </head>
  <body>
  
<!-- 引入 Coze Web SDK 官方 CDN -->
<script src="https://lf-cdn.coze.cn/obj/unpkg/latest/coze/web-sdk/dist/js-umd/index.min.js"></script>
<script>
  // 初始化 Web SDK
  cozeWebSDK.init({
    projectId: '7627423082134781971',
    // 支持同步和异步刷新 token
    refreshToken: () => Promise.resolve('<YOUR_TOKEN>'),
  });
</script>
  </body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全工具</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui;
            line-height: 1.4;
            background: #f3f4f6;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin: 1.5rem 0;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
            padding: 0.5rem;
        }

        .category-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .category-card:hover {
            transform: translateY(-3px);
        }

        h2 {
            color: var(--primary-color);
            font-size: 1.15rem;
            margin-bottom: 0.75rem;
            padding-bottom: 0.25rem;
            border-bottom: 2px solid #e5e7eb;
        }

        .link-list {
            list-style: none;
        }

        .link-item {
            margin: 0.5rem 0;
        }

        .link-item a {
            display: flex;
            align-items: center;
            padding: 0.6rem;
            border-radius: 8px;
            color: #1f2937;
            text-decoration: none;
            transition: background 0.2s;
        }

        .link-item a:hover {
            background: #f1f5f9;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            body {
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>hack工具</h1>
        
        <div class="grid">
              <!-- 我的工具 -->
            <div class="category-card">
                <h2>工具</h2>
                <ul class="link-list">
                    <li class="link-item"><a href="https://github.com/dhylands/rshell" target="_blank">rshell 远程命令执行</a></li>                    
                    <li class="link-item"><a href="https://github.com/0x4m4/hexstrike-ai" target="_blank">hexstrike-ai </a></li>                    
                    <li class="link-item"><a href="https://github.com/dhylands/rshell" target="_blank">yakit</a></li>
                    <li class="link-item"><a href="https://github.com/zhuifengshaonianhanlu/pikachu" target="_blank">pikachu靶场 </a></li>  
                    <li class="link-item"><a href="" target="_blank">Nessus</a></li> 
                    <li class="link-item"><a href="" target="_blank">Crawlee </a> </li>         
                    <li class="link-item"><a href="" target="_blank">Kali </a></li>         
                    <li class="link-item"><a href="" target="_blank"></a></li>                              
                    
                   
                </ul>
            </div>
              

            <!-- 技术文档 -->
            <div class="category-card">
                <h2>开源项目</h2>
                <ul class="link-list">
                    <li class="link-item"><a href="https://gitee.com/explore/all?order=starred" target="_blank">gitee热门开源项目</a></li>
                    
                </ul>
            </div>

             
           

             <!-- 爬虫资源 -->
           


        </div>
    </div>
</body>
</html>
